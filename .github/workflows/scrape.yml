name: Scrape & Deploy

on:
  schedule:
    - cron: '0 6 * * *'  # Каждый день в 6:00 UTC (9:00 МСК)
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Install Playwright Chromium
        run: bunx playwright install chromium --with-deps

      - name: Run scraper
        run: bun run scrape
        timeout-minutes: 30

      - name: Copy data to web directory
        run: |
          mkdir -p web/data
          cp data/products.json web/data/products.json

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./web
          force_orphan: true

      - name: Commit fresh data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/products.json
          git diff --cached --quiet || git commit -m "chore: update products data $(date -u +%Y-%m-%d)"
          git push
