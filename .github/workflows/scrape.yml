name: Scrape & Deploy

on:
  schedule:
    - cron: '0 6 * * *'  # Every day at 6:00 UTC (9:00 MSK)
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Install Chrome and browser deps
        run: |
          # Install real Google Chrome + xvfb for headful mode
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable xvfb
          # Install rebrowser-playwright browser and system deps
          bunx rebrowser-playwright install chromium --with-deps

      - name: Run scraper with virtual display
        run: |
          # Use xvfb to provide a virtual display for headful Chrome
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" \
            bun run scrape
        timeout-minutes: 30
        env:
          CI: "true"

      - name: Copy data to web directory
        run: |
          mkdir -p web/data
          cp data/products.json web/data/products.json

      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-debug
          path: |
            data/debug-*.png
            data/debug-*.html
          if-no-files-found: ignore
          retention-days: 3

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./web
          force_orphan: true

      - name: Commit fresh data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/products.json
          git diff --cached --quiet || git commit -m "chore: update products data $(date -u +%Y-%m-%d)"
          git push
